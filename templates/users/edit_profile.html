{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Редактирование профиля</h1>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100">Сохранить</button>
        </form>
        <a href="{% url 'profile' %}" class="btn btn-outline-secondary w-100 mt-3">Назад</a>
    </div>
</div>
{% endblock %}
