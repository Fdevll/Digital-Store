{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Редактирование профиля — DigitalStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <h1 class="mb-4">Редактирование профиля</h1>
        <form method="post">
            {% csrf_token %}
            {{ user_form|crispy }}
            {{ profile_form|crispy }}
            <button type="submit" class="btn btn-primary w-100">Сохранить</button>
        </form>
        <a href="{% url 'profile' %}" class="btn btn-outline-secondary w-100 mt-2">Отмена</a>
    </div>
</div>
{% endblock %}
