{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Мои скачивания</h1>

{% if downloads %}
<div class="list-group">
    {% for dl in downloads %}
    <div class="list-group-item d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-1">{{ dl.product.title }}</h5>
            <small class="text-muted">Доступно до {{ dl.expires_at|date:"d.m.Y H:i" }}</small>
        </div>
        <a href="{% url 'download_file' dl.download_token %}" class="btn btn-primary btn-sm">Скачать</a>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="alert alert-info">Пока нет доступных файлов для скачивания.</div>
{% endif %}

<a href="{% url 'profile' %}" class="btn btn-outline-secondary mt-3">Назад в профиль</a>
{% endblock %}
