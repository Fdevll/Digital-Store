<div class="card product-card h-100">
    {% if product.preview_image %}
        <img src="{{ product.preview_image.url }}" class="product-thumb" alt="{{ product.title }}">
    {% else %}
        <div class="product-thumb-empty">Без превью</div>
    {% endif %}
    <div class="card-body d-flex flex-column">
        <h5 class="card-title">
            <a href="{{ product.get_absolute_url }}">{{ product.title }}</a>
        </h5>
        <p class="card-text flex-grow-1">{{ product.description|truncatewords:12 }}</p>
        <div class="d-flex justify-content-between align-items-center mt-2">
            <span class="price">{{ product.price }} ₽</span>
            <button type="button" onclick="addToCart({{ product.id }})" class="btn btn-sm btn-outline-primary">В корзину</button>
        </div>
    </div>
</div>
