{% extends 'base.html' %}

{% block title %}Оплата прошла — DigitalStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <h1 class="mb-3">Оплата прошла успешно</h1>
        <p class="text-muted mb-4">
            Заказ №{{ order.id }} оплачен. Ссылки на скачивание доступны
            в личном кабинете в течение 30 дней.
        </p>
        <div class="d-flex justify-content-center gap-2">
            <a href="{% url 'order_complete' order.id %}" class="btn btn-primary">Скачать файлы</a>
            <a href="{% url 'profile' %}" class="btn btn-outline-secondary">В личный кабинет</a>
        </div>
    </div>
</div>
{% endblock %}
