{% extends 'base.html' %}

{% block content %}
<div class="text-center py-5">
    <div class="mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#dc3545" class="bi bi-x-circle" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
        </svg>
    </div>
    <h1 class="mb-3">Оплата не прошла</h1>
    <p class="lead mb-4">К сожалению, оплата заказа #{{ order.id }} не была завершена.</p>

    <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'payment_create' order.id %}" class="btn btn-primary btn-lg">Попробовать снова</a>
        <a href="{% url 'catalog' %}" class="btn btn-outline-secondary btn-lg">Вернуться в каталог</a>
    </div>
</div>
{% endblock %}
