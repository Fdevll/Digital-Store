{% extends 'base.html' %}

{% block title %}Оплата не прошла — DigitalStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <h1 class="mb-3">Оплата не прошла</h1>
        <p class="text-muted mb-4">Оплата заказа №{{ order.id }} не была завершена. Попробуйте ещё раз.</p>
        <div class="d-flex justify-content-center gap-2">
            <a href="{% url 'payment_create' order.id %}" class="btn btn-primary">Повторить оплату</a>
            <a href="{% url 'catalog' %}" class="btn btn-outline-secondary">В каталог</a>
        </div>
    </div>
</div>
{% endblock %}
