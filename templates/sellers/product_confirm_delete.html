{% extends 'base.html' %}

{% block title %}Удаление товара — DigitalStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Удалить товар?</h1>
        <p>Вы уверены, что хотите удалить товар <strong>«{{ product.title }}»</strong>? Действие необратимо.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'seller_dashboard' %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
